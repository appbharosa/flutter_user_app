name: user
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.1+10

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Networking & State Management
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  equatable: ^2.0.8
  connectivity_plus: ^7.1.1
  flutter_secure_storage: ^10.0.0
  dartz: ^0.10.1

  # UI & Assets
  flutter_svg: ^2.0.10+1
  lottie: ^3.3.3
  cached_network_image: ^3.3.0
  cupertino_icons: ^1.0.8
  carousel_slider: ^5.0.0
  flutter_pdfview: ^1.4.4
  share_plus: ^7.2.1
  url_launcher: ^6.3.0

  # Location & Maps
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  location: ^8.0.1

  # Media & Files
  image_picker: ^1.2.2
  file_picker: ^8.0.0+1

  # WebView & Payments
  webview_flutter: ^4.8.0
  flutter_cashfree_pg_sdk: ^2.0.25+28

  # Push Notifications
  onesignal_flutter: ^5.5.4

  # Video Calling (EnableX)
  enx_flutter_plugin: ^3.1.5
  permission_handler: ^12.0.1
  just_audio: ^0.10.4
  flutter_background_service: ^5.0.7
  wakelock_plus: ^1.2.8

  flutter_launcher_icons: ^0.14.4
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0
  android_intent_plus: ^5.1.0
  provider: ^6.1.2
  flutter_facebook_auth: ^7.1.1
  facebook_app_events: ^0.27.1
  app_settings: ^5.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.13.1
  flutter_lints: ^6.0.0

# 🔧 Resolve the js version conflict between enx_flutter_plugin and flutter_cashfree_pg_sdk
dependency_overrides:
  js: ^0.7.2

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/poppins/Poppins-Italic.ttf
        - asset: assets/fonts/poppins/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/poppins/Poppins-Regular.ttf
        - asset: assets/fonts/poppins/Poppins-SemiBold.ttf
          weight: 600

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"